<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f6b4f">
<title>Panel de Alquileres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="gate" class="gate"></div>

<header>
  <div class="wrap">
    <div class="head-row">
      <div class="head-title"><span class="dot"></span><span id="headTitle">Este mes</span></div>
      <button class="icon-btn" onclick="openSettings()" aria-label="Ajustes">&#9881;</button>
    </div>
    <div class="month-bar" id="monthBar">
      <button onclick="changeMonth(-1)" aria-label="Mes anterior">&#8249;</button>
      <button class="month-label" id="monthLabel" onclick="goToday()" title="Ir al mes actual" aria-label="Mes mostrado. Tocá para ir al mes actual.">&mdash;</button>
      <button onclick="changeMonth(1)" aria-label="Mes siguiente">&#8250;</button>
    </div>
  </div>
</header>

<main>
  <section class="view active" id="view-mes"></section>
  <section class="view" id="view-duenos"></section>
  <section class="view" id="view-alquileres"></section>
  <section class="view" id="view-deptos"></section>
  <section class="view" id="view-dashboard"></section>
</main>

<nav>
  <button class="tab active" data-tab="mes" onclick="go('mes')"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>Seguimiento</button>
  <button class="tab" data-tab="duenos" onclick="go('duenos')"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg>Dueños</button>
  <button class="tab" data-tab="alquileres" onclick="go('alquileres')"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0"/><path d="m7.5 12.5 3 3L22 5"/></svg>Vencimientos</button>
  <button class="tab" data-tab="deptos" onclick="go('deptos')"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 21h18M5 21V7l7-4 7 4v14"/><path d="M9 9h.01M9 13h.01M9 17h.01M15 9h.01M15 13h.01M15 17h.01"/></svg>Deptos</button>
  <button class="tab" data-tab="dashboard" onclick="go('dashboard')"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 3v18h18"/><path d="M7 15l3-4 3 2 4-6"/></svg>Dashboard</button>
</nav>

<div class="sheet-bg" id="sheetBg" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title"></div></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
